<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuzion Before & After</title>

<link rel="stylesheet" href="style.css">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</head>
<body>

<div id="capture" class="canvas">

    <label class="upload before">
        <input type="file" accept="image/*" capture="environment" id="beforeInput">
        <img id="beforeImg">
        <span>CLICK TO UPLOAD</span>
    </label>

    <label class="upload after">
        <input type="file" accept="image/*" capture="environment" id="afterInput">
        <img id="afterImg">
        <span>CLICK TO UPLOAD</span>
    </label>

</div>

<div class="btn-area">

    <button onclick="downloadResult()">
        Download Image
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
